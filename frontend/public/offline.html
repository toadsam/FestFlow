<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오프라인 안내</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: 'Segoe UI', sans-serif;
        background: #f1f5f9;
      }
      article {
        width: min(92vw, 430px);
        overflow: hidden;
        background: #081320;
        border: 1px solid #22d3ee66;
        border-radius: 16px;
        color: #dffbff;
        box-shadow: 0 0 28px #0ea5e940;
      }
      img {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
      }
      div {
        padding: 20px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
      }
      p {
        margin: 10px 0 0;
        color: #b7e8f4;
      }
    </style>
  </head>
  <body>
    <article>
      <img src="/images/offline-state.png" alt="" />
      <div>
        <h1>오프라인 상태입니다</h1>
        <p>인터넷 연결을 확인한 뒤 다시 시도해 주세요. 실시간 혼잡도, 지도, AI 답변은 온라인 연결이 필요합니다.</p>
      </div>
    </article>
  </body>
</html>
