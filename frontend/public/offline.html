<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오프라인 안내</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: 'Segoe UI', sans-serif;
        background: #f1f5f9;
      }
      article {
        width: min(92vw, 430px);
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <article>
      <h1>오프라인 상태입니다</h1>
      <p>인터넷 연결을 확인한 뒤 다시 시도해 주세요.</p>
    </article>
  </body>
</html>
