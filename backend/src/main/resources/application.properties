spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/festival_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}

server.port=${PORT:8080}

app.jwt.secret=${APP_JWT_SECRET:festflow-super-secret-key-festflow-super-secret-key}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.ops.master-key=${APP_OPS_MASTER_KEY:}
app.ops.booth-keys=${APP_OPS_BOOTH_KEYS:}
app.sms.provider=${APP_SMS_PROVIDER:none}
app.sms.debug-return-code=${APP_SMS_DEBUG_RETURN_CODE:false}
app.sms.max-verify-attempts=${APP_SMS_MAX_VERIFY_ATTEMPTS:5}
app.sms.twilio.account-sid=${APP_SMS_TWILIO_ACCOUNT_SID:}
app.sms.twilio.auth-token=${APP_SMS_TWILIO_AUTH_TOKEN:}
app.sms.twilio.from-number=${APP_SMS_TWILIO_FROM_NUMBER:}
app.sms.aligo.api-key=${APP_SMS_ALIGO_API_KEY:}
app.sms.aligo.user-id=${APP_SMS_ALIGO_USER_ID:}
app.sms.aligo.sender=${APP_SMS_ALIGO_SENDER:}
app.sms.aligo.test-mode=${APP_SMS_ALIGO_TEST_MODE:false}
app.init.admin.username=${APP_INIT_ADMIN_USERNAME:}
app.init.admin.password=${APP_INIT_ADMIN_PASSWORD:}

