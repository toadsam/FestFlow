spring.config.import=optional:file:./application-secrets.properties
spring.datasource.url=${SPRING_DATASOURCE_URL_LOCAL:jdbc:mysql://localhost:3306/festival_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME_LOCAL:root}
